<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160" role="img" aria-label="Walking character animation">
  <defs>
    <style>
      .skin { fill: #f5cbb8; stroke: #1e293b; stroke-width: 2.2; }
      .shirt { fill: #38bdf8; stroke: #1e293b; stroke-width: 2.2; }
      .pants { fill: #334155; stroke: #1e293b; stroke-width: 2; }
      .hair { fill: #3f2e22; stroke: #1e293b; stroke-width: 2; }
      .shoe { fill: #0f172a; stroke: #1e293b; stroke-width: 1.5; }
      .limb {
        stroke: #1e293b;
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      /* Pivot groups: local origin at hip / shoulder */
      #bob {
        animation: bob 0.55s ease-in-out infinite;
      }
      @keyframes bob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }

      #leg-l {
        transform-origin: 48px 88px;
        animation: swing-l 0.55s ease-in-out infinite;
      }
      #leg-r {
        transform-origin: 72px 88px;
        animation: swing-r 0.55s ease-in-out infinite;
      }
      @keyframes swing-l {
        0%, 100% { transform: rotate(-26deg); }
        50% { transform: rotate(26deg); }
      }
      @keyframes swing-r {
        0%, 100% { transform: rotate(26deg); }
        50% { transform: rotate(-26deg); }
      }

      #arm-l {
        transform-origin: 40px 58px;
        animation: arm-l 0.55s ease-in-out infinite;
      }
      #arm-r {
        transform-origin: 80px 58px;
        animation: arm-r 0.55s ease-in-out infinite;
      }
      @keyframes arm-l {
        0%, 100% { transform: rotate(32deg); }
        50% { transform: rotate(-32deg); }
      }
      @keyframes arm-r {
        0%, 100% { transform: rotate(-32deg); }
        50% { transform: rotate(32deg); }
      }

      /* Subtle head bob independent of body */
      #head-g {
        transform-origin: 60px 38px;
        animation: head-nod 0.55s ease-in-out infinite;
      }
      @keyframes head-nod {
        0%, 100% { transform: rotate(-2deg); }
        50% { transform: rotate(2deg); }
      }
    </style>
  </defs>

  <!-- Shadow -->
  <ellipse cx="60" cy="148" rx="22" ry="5" fill="rgba(15,23,42,0.18)"/>

  <g id="bob">
    <!-- Legs (behind body draw order: legs first) -->
    <g id="leg-l">
      <line class="limb" x1="48" y1="88" x2="42" y2="118"/>
      <line class="limb" x1="42" y1="118" x2="38" y2="138"/>
      <ellipse class="shoe" cx="36" cy="141" rx="9" ry="4"/>
    </g>
    <g id="leg-r">
      <line class="limb" x1="72" y1="88" x2="78" y2="118"/>
      <line class="limb" x1="78" y1="118" x2="82" y2="138"/>
      <ellipse class="shoe" cx="84" cy="141" rx="9" ry="4"/>
    </g>

    <!-- Torso -->
    <rect class="shirt" x="38" y="52" width="44" height="42" rx="10"/>

    <!-- Arms -->
    <g id="arm-l">
      <line class="limb" x1="40" y1="58" x2="26" y2="78"/>
      <circle class="skin" cx="24" cy="82" r="7"/>
    </g>
    <g id="arm-r">
      <line class="limb" x1="80" y1="58" x2="94" y2="78"/>
      <circle class="skin" cx="96" cy="82" r="7"/>
    </g>

    <!-- Pants / hips -->
    <path class="pants" d="M 40 88 L 44 88 L 48 88 L 52 88 L 56 88 L 60 88 L 64 88 L 68 88 L 72 88 L 76 88 L 80 88 L 80 94 L 38 94 Z"/>

    <!-- Head -->
    <g id="head-g">
      <circle class="skin" cx="60" cy="32" r="22"/>
      <path class="hair" d="M 38 28 Q 42 8 60 6 Q 78 8 82 28 Q 76 22 60 20 Q 44 22 38 28 Z"/>
      <!-- Eyes -->
      <circle fill="#1e293b" cx="52" cy="32" r="3"/>
      <circle fill="#1e293b" cx="68" cy="32" r="3"/>
      <path fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round" d="M 54 42 Q 60 46 66 42"/>
    </g>
  </g>
</svg>
