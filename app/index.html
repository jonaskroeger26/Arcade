<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
    <meta name="theme-color" content="#09090b">
    <title>Arcade Empire</title>
    <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
    <script src="mwa-bundle.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --surface-hover: #27272a;
            --border: #27272a;
            --border-strong: #3f3f46;
            --accent: #0ea5e9;
            --accent-dim: rgba(14, 165, 233, 0.12);
            --violet: #8b5cf6;
            --violet-dim: rgba(139, 92, 246, 0.15);
            --success: #22c55e;
            --warning: #f59e0b;
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --danger: #ef4444;
            --floor: #27272a;
            --wall: #3f3f46;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: "DM Sans", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100%;
            -webkit-font-smoothing: antialiased;
        }
        #app {
            max-width: 420px;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
        }
        .app-shell {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
        }
        .main-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 16px 12px;
            -webkit-overflow-scrolling: touch;
        }
        .live-strip {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 14px;
        }
        .live-strip-inner {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            font-variant-numeric: tabular-nums;
        }
        @media (max-width: 360px) {
            .live-strip-inner {
                grid-template-columns: repeat(2, 1fr);
                row-gap: 8px;
            }
        }
        .live-strip .cell label {
            display: block;
            font-size: 0.5625rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }
        .live-strip .cell strong {
            font-size: 0.8125rem;
            font-weight: 700;
        }
        .live-strip .cell.tickets strong { color: #fbbf24; }
        .live-strip .cell.hype strong { color: #2dd4bf; }
        .tab-context {
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.45;
            margin: 0 0 12px;
        }
        .tab-panel {
            display: none;
            animation: tabFade 0.2s ease;
        }
        .tab-panel.active {
            display: block;
        }
        @keyframes tabFade {
            from { opacity: 0.85; }
            to { opacity: 1; }
        }
        .tab-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .tab-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            min-height: 48px;
            padding: 8px 6px;
            border-radius: 10px;
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .tab-btn:active { transform: scale(0.97); }
        .tab-btn .tab-ico {
            font-size: 1.125rem;
            line-height: 1;
            opacity: 0.9;
        }
        .tab-btn.active {
            color: var(--accent);
            background: var(--accent-dim);
        }
        .top {
            margin-bottom: 20px;
        }
        .top-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }
        .top h1 {
            font-weight: 700;
            font-size: 1.375rem;
            letter-spacing: -0.03em;
            line-height: 1.2;
        }
        .top .subtitle {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 4px;
            max-width: 260px;
            line-height: 1.4;
        }
        .top a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8125rem;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }
        .top a:hover { background: var(--surface-hover); color: var(--text); }
        .hud {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
        }
        .stat .lbl {
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .stat .val {
            font-size: 1.25rem;
            font-weight: 700;
            margin-top: 6px;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }
        .stat.tickets .val { color: #fbbf24; }
        .stat.hype .val { color: #2dd4bf; }
        .stat.token .val {
            font-size: 0.8125rem;
            word-break: break-all;
            color: #86efac;
            font-weight: 600;
        }
        .toolbar-label {
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
        .row-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-size: 0.8125rem;
            font-weight: 600;
            padding: 10px 14px;
            transition: background 0.15s, transform 0.12s, opacity 0.15s;
        }
        button:active { transform: scale(0.98); }
        button:disabled { cursor: not-allowed; opacity: 0.5; }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover:not(:disabled) { filter: brightness(1.05); }
        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover:not(:disabled) { background: var(--surface-hover); }
        .btn-amber {
            background: #d97706;
            color: #fff;
        }
        .btn-amber:hover:not(:disabled) { filter: brightness(1.06); }
        .btn-muted {
            background: var(--surface);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-claw {
            background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
            color: #fff;
            flex: 1 1 100%;
            padding: 14px 16px;
            font-size: 0.9375rem;
            font-weight: 600;
            border-radius: 10px;
        }
        .btn-claw:hover:not(:disabled) { filter: brightness(1.06); }
        .home-machines-section {
            margin-top: 20px;
        }
        .home-machines-section h2 {
            margin-bottom: 10px;
        }
        .room-floor--home {
            padding-top: 16px;
        }
        section { margin-bottom: 20px; }
        section h2 {
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
        .arcade-room {
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
            background: linear-gradient(180deg, var(--wall) 0%, #3f3f46 22%, var(--surface) 22%);
            box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset;
        }
        .room-wall {
            padding: 12px 16px;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.15);
        }
        .room-wall .strip {
            font-size: 0.625rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(250,250,250,0.35);
        }
        .claw-booth {
            margin: 12px auto 10px;
            max-width: 100%;
            padding: 0 12px;
        }
        .claw-booth-inner {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .claw-booth-inner .claw-mini {
            width: 56px;
            height: 56px;
            flex-shrink: 0;
            opacity: 0.9;
        }
        .claw-booth .claw-label {
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text);
        }
        .claw-booth .claw-hint {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
            line-height: 1.4;
        }
        .room-floor {
            background: linear-gradient(180deg, #52525b 0%, var(--floor) 100%);
            padding: 16px 12px 22px;
        }
        .floor-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .slot {
            min-height: 132px;
            background: rgba(0,0,0,0.15);
            border: 1px dashed var(--border-strong);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 500;
            text-align: center;
            padding: 12px;
            line-height: 1.45;
        }
        .cabinet {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            min-height: 132px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }
        .cabinet.rush { box-shadow: 0 0 0 1px rgba(245, 158, 11, 0.45), 0 4px 16px rgba(0,0,0,0.25); }
        .cabinet.broken { border-color: rgba(239, 68, 68, 0.45); }
        .cabinet .cab-art {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 92px;
            margin-bottom: 4px;
            perspective: 800px;
            transform-style: preserve-3d;
        }
        .cabinet .machine-img {
            width: 76px;
            height: 92px;
            object-fit: contain;
            transform: rotateX(3deg) rotateY(-6deg) translateZ(2px);
            transform-origin: 50% 85%;
            filter: drop-shadow(2px 8px 8px rgba(0,0,0,0.35));
            transition: transform 0.2s ease, filter 0.2s ease;
        }
        .cabinet.broken .machine-img {
            transform: rotateX(3deg) rotateY(-6deg) translateZ(0);
            filter: grayscale(0.85) brightness(0.72) drop-shadow(2px 5px 6px rgba(0,0,0,0.3));
        }
        .machine-fallback { font-size: 1.5rem; opacity: 0.45; }
        .cabinet .name { font-size: 0.8125rem; font-weight: 600; text-align: center; }
        .cabinet .meta { font-size: 0.6875rem; color: var(--text-secondary); text-align: center; margin-top: 6px; line-height: 1.4; }
        .cabinet .actions { margin-top: auto; display: flex; flex-direction: column; gap: 6px; }
        .cabinet .actions button {
            width: 100%;
            padding: 8px;
            font-size: 0.6875rem;
            border-radius: 8px;
        }
        .btn-upgrade {
            background: var(--accent-dim);
            color: #7dd3fc;
            border: 1px solid rgba(14, 165, 233, 0.35);
        }
        .btn-repair {
            background: rgba(239, 68, 68, 0.12);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .shop { display: flex; flex-direction: column; gap: 8px; }
        .shop-item {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
        }
        .shop-item .ico {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 58px;
            height: 72px;
            perspective: 640px;
            transform-style: preserve-3d;
        }
        .shop-item .machine-thumb {
            width: 56px;
            height: 70px;
            object-fit: contain;
            transform: rotateX(2deg) rotateY(-5deg) translateZ(1px);
            transform-origin: 50% 88%;
            filter: drop-shadow(2px 6px 7px rgba(0,0,0,0.32));
        }
        .shop-item .info { flex: 1; min-width: 0; }
        .shop-item .info .n { font-size: 0.875rem; font-weight: 600; }
        .shop-item .info .d { font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px; line-height: 1.5; }
        .shop-item button {
            background: var(--accent);
            color: #fff;
            white-space: nowrap;
            flex-shrink: 0;
            border-radius: 8px;
        }
        .footer-note {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.55;
            margin-top: 8px;
        }
        .toast {
            position: fixed;
            bottom: calc(84px + env(safe-area-inset-bottom, 0px));
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 20px;
            background: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            font-size: 0.8125rem;
            font-weight: 500;
            z-index: 200;
            max-width: min(92vw, 360px);
            text-align: center;
            box-shadow: 0 12px 48px rgba(0,0,0,0.45);
            animation: toastIn 0.25s ease;
        }
        .toast.err { border-color: rgba(239,68,68,0.5); color: #fecaca; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(8px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            z-index: 150;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 16px;
        }
        @media (min-width:480px) {
            .modal-bg { align-items: center; }
        }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            max-height: 90vh;
            overflow: auto;
            padding: 20px;
        }
        .modal .modal-head { margin-bottom: 16px; }
        .modal h3 { font-size: 1.125rem; font-weight: 700; letter-spacing: -0.02em; }
        .modal .close {
            float: right;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px;
        }
        .bp-track { margin-top: 12px; }
        .bp-tier {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border-radius: 10px;
            background: var(--bg);
            margin-bottom: 8px;
            font-size: 0.75rem;
            border: 1px solid transparent;
        }
        .bp-tier.claimed { opacity: 0.45; }
        .bp-tier.active { border-color: rgba(245, 158, 11, 0.35); }
        .bp-tier button {
            margin-left: auto;
            padding: 6px 10px;
            font-size: 0.6875rem;
            border-radius: 8px;
        }
        .progress {
            height: 6px;
            background: var(--bg);
            border-radius: 6px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress > i {
            display: block;
            height: 100%;
            background: var(--accent);
            border-radius: 6px;
        }

        /* Claw machine modal (SVG 3D-style cabinet + controls) */
        .claw-modal { padding: 0; overflow: hidden; border-radius: 16px; }
        .claw-modal .modal-inner { padding: 20px 20px 18px; }
        .claw-modal h3 { font-size: 1.125rem; font-weight: 700; letter-spacing: -0.02em; }
        .claw-modal .claw-sub { font-size: 0.8125rem; color: var(--text-secondary); margin-top: 4px; line-height: 1.45; }
        .claw-stage-wrap {
            margin: 16px 0 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: linear-gradient(165deg, rgba(127,29,29,0.12) 0%, #0c0a09 45%, #090706 100%);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.06),
                0 12px 40px rgba(0,0,0,0.35);
        }
        .claw-stage-3d { line-height: 0; }
        .claw-svg {
            width: 100%;
            height: auto;
            display: block;
            max-height: min(58vh, 384px);
            shape-rendering: geometricPrecision;
            filter: drop-shadow(0 14px 22px rgba(0,0,0,0.38));
        }
        .claw-deck {
            margin-top: 14px;
            padding: 14px 14px 12px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .claw-deck-row {
            display: flex;
            flex-wrap: wrap;
            align-items: stretch;
            gap: 12px;
        }
        .claw-pad {
            display: grid;
            grid-template-columns: 44px 44px 44px;
            grid-template-rows: 44px 44px 44px;
            gap: 6px;
            flex: 0 0 auto;
        }
        .claw-pad-spacer { pointer-events: none; }
        .claw-pad-center {
            border-radius: 8px;
            background: rgba(39,39,42,0.45);
            border: 1px dashed var(--border);
            align-self: stretch;
        }
        .claw-pad-btn {
            padding: 0;
            min-width: 44px;
            min-height: 44px;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            font-size: 0.875rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }
        .claw-pad-btn:hover:not(:disabled) {
            color: var(--text);
        }
        .claw-grab-btn {
            flex: 1 1 140px;
            min-height: 44px;
            align-self: stretch;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9375rem;
            letter-spacing: 0.04em;
            background: linear-gradient(180deg, #34d399 0%, var(--success) 100%);
            border: 1px solid rgba(34,197,94,0.65);
            box-shadow: 0 1px 0 rgba(255,255,255,0.12) inset, 0 8px 20px rgba(22,163,74,0.2);
        }
        .claw-grab-btn:hover:not(:disabled) {
            filter: brightness(1.05);
        }
        .claw-grab-btn:disabled {
            opacity: 0.55;
            box-shadow: none;
        }
        .claw-deck-fine {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .claw-fine-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .claw-fine-label {
            flex: 0 0 44px;
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
        }
        .claw-slider {
            flex: 1 1 auto;
            min-width: 0;
            accent-color: var(--accent);
            height: 6px;
            cursor: pointer;
        }
        .claw-slider-z { min-width: 0; }
        .claw-hint-keys kbd {
            font-family: ui-monospace, monospace;
            font-size: 0.6875rem;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--bg);
        }
        .claw-result {
            margin: 16px 0 0;
            padding: 14px 16px;
            border-radius: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            display: none;
        }
        .claw-result.visible { display: block; }
        .claw-result .result-title { font-weight: 700; font-size: 0.9375rem; }
        .claw-result .result-body { font-size: 0.8125rem; color: var(--text-secondary); margin-top: 6px; line-height: 1.45; }
        .claw-result .result-chip {
            display: inline-block;
            margin-top: 10px;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 4px 10px;
            border-radius: 6px;
            background: var(--violet-dim);
            color: #c4b5fd;
        }
        .claw-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .claw-actions button { flex: 1; justify-content: center; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="./arcade-game.js"></script>
</body>
</html>
