<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
    <meta name="theme-color" content="#1c1917">
    <title>Arcade Empire — Tycoon</title>
    <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
    <script src="mwa-bundle.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1c1917;
            --bg-elev: #292524;
            --panel: #44403c;
            --panel2: #57534e;
            --border: #57534e;
            --accent: #0d9488;
            --accent-hover: #0f766e;
            --accent-muted: rgba(13, 148, 136, 0.2);
            --warm: #ea580c;
            --gold: #ca8a04;
            --text: #fafaf9;
            --muted: #a8a29e;
            --danger: #dc2626;
            --floor: #3f3a36;
            --floor-line: #292524;
            --wall: #44403c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: "DM Sans", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100%;
            -webkit-font-smoothing: antialiased;
        }
        .layout {
            max-width: 440px;
            margin: 0 auto;
            min-height: 100vh;
            padding: 16px 16px 88px;
        }
        .top {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .top h1 {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            flex: 1 1 auto;
        }
        .top a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.8125rem;
            font-weight: 500;
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 8px;
        }
        .top a:hover { color: var(--text); border-color: var(--muted); }
        .hud {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }
        .stat {
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
        }
        .stat .lbl {
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .stat .val {
            font-size: 1.125rem;
            font-weight: 700;
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
            color: var(--text);
        }
        .stat.tickets .val { color: #fdba74; }
        .stat.hype .val { color: #5eead4; }
        .stat.token .val { font-size: 0.8125rem; word-break: break-all; color: #86efac; font-weight: 600; }
        .row-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-size: 0.8125rem;
            font-weight: 600;
            padding: 10px 14px;
            transition: transform 0.12s, filter 0.12s;
        }
        button:active { transform: scale(0.98); }
        .btn-neon {
            background: var(--accent);
            color: #fff;
        }
        .btn-neon:hover { filter: brightness(1.08); }
        .btn-neon:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-rush {
            background: var(--warm);
            color: #fff;
        }
        .btn-rush:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-bp {
            background: var(--panel);
            color: var(--gold);
            border: 1px solid var(--border);
        }
        .btn-wallet {
            background: var(--bg-elev);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-claw {
            background: linear-gradient(180deg, #7c3aed, #5b21b6);
            color: #fff;
            flex: 1 1 100%;
            padding: 14px;
            font-size: 0.9375rem;
        }
        .btn-claw:disabled {
            background: var(--panel);
            color: var(--muted);
            cursor: not-allowed;
        }
        section { margin-bottom: 16px; }
        section h2 {
            font-size: 0.6875rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }
        .arcade-room {
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            background: linear-gradient(180deg, #3d3834 0%, var(--wall) 28%, var(--wall) 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .room-wall {
            padding: 14px 16px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.2);
        }
        .room-wall .strip {
            display: inline-flex;
            gap: 6px;
            opacity: 0.35;
            font-size: 0.625rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text);
        }
        .claw-booth {
            margin: 12px auto 8px;
            max-width: 220px;
            background: rgba(0,0,0,0.25);
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .claw-booth .claw-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #e9d5ff;
            margin-bottom: 8px;
        }
        .claw-booth .claw-visual {
            font-size: 2.25rem;
            line-height: 1;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.35));
        }
        .room-floor {
            background:
                repeating-linear-gradient(90deg, transparent, transparent 11px, rgba(0,0,0,0.12) 11px, rgba(0,0,0,0.12) 12px),
                linear-gradient(180deg, var(--floor) 0%, #2a2622 100%);
            padding: 16px 12px 20px;
            min-height: 140px;
        }
        .floor-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .slot {
            min-height: 128px;
            background: rgba(0,0,0,0.2);
            border: 2px dashed rgba(255,255,255,0.12);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 0.75rem;
            font-weight: 500;
            text-align: center;
            padding: 10px;
        }
        .cabinet {
            background: linear-gradient(180deg, var(--panel) 0%, var(--bg-elev) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px;
            width: 100%;
            min-height: 128px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 20px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .cabinet.rush { box-shadow: 0 0 0 2px rgba(234, 88, 12, 0.5), 0 8px 20px rgba(0,0,0,0.35); }
        .cabinet.broken {
            border-color: rgba(220, 38, 38, 0.55);
            opacity: 0.95;
        }
        .cabinet .cab-art {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 92px;
            margin-bottom: 4px;
            perspective: 380px;
            transform-style: preserve-3d;
        }
        .cabinet .machine-img {
            width: 76px;
            height: 92px;
            object-fit: contain;
            transform: rotateX(10deg) rotateY(-22deg) translateZ(6px);
            transform-origin: 50% 80%;
            filter: drop-shadow(4px 12px 10px rgba(0,0,0,0.45)) drop-shadow(0 2px 2px rgba(0,0,0,0.25));
            transition: transform 0.2s ease, filter 0.2s ease;
        }
        .cabinet.broken .machine-img {
            transform: rotateX(10deg) rotateY(-22deg) translateZ(2px);
            filter: grayscale(0.85) brightness(0.75) drop-shadow(2px 6px 6px rgba(0,0,0,0.35));
        }
        .machine-fallback {
            font-size: 1.5rem;
            opacity: 0.5;
        }
        .cabinet .name { font-size: 0.8125rem; font-weight: 700; text-align: center; color: var(--text); }
        .cabinet .meta { font-size: 0.6875rem; color: var(--muted); text-align: center; margin-top: 6px; line-height: 1.35; }
        .cabinet .actions { margin-top: auto; display: flex; flex-direction: column; gap: 6px; }
        .cabinet .actions button {
            width: 100%;
            padding: 8px;
            font-size: 0.6875rem;
        }
        .btn-upgrade {
            background: var(--accent-muted);
            color: #99f6e4;
            border: 1px solid rgba(45, 212, 191, 0.35);
        }
        .btn-repair {
            background: rgba(220, 38, 38, 0.15);
            color: #fecaca;
            border: 1px solid rgba(220, 38, 38, 0.35);
        }
        .shop {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .shop-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
        }
        .shop-item .ico {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 58px;
            height: 72px;
            perspective: 260px;
            transform-style: preserve-3d;
        }
        .shop-item .machine-thumb {
            width: 56px;
            height: 70px;
            object-fit: contain;
            transform: rotateX(7deg) rotateY(-16deg) translateZ(4px);
            transform-origin: 50% 85%;
            filter: drop-shadow(3px 8px 8px rgba(0,0,0,0.4));
        }
        .shop-item .info { flex: 1; min-width: 0; }
        .shop-item .info .n { font-size: 0.875rem; font-weight: 700; color: var(--text); }
        .shop-item .info .d { font-size: 0.75rem; color: var(--muted); margin-top: 4px; line-height: 1.45; }
        .shop-item button {
            background: var(--accent);
            color: #fff;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .shop-item button:disabled { opacity: 0.38; cursor: not-allowed; }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.8125rem;
            font-weight: 500;
            z-index: 50;
            max-width: 92vw;
            text-align: center;
            animation: pop 0.28s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.45);
        }
        .toast.err { border-color: var(--danger); color: #fecaca; }
        @keyframes pop {
            from { opacity: 0; transform: translateX(-50%) translateY(8px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 16px;
        }
        .modal {
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 16px 16px 0 0;
            max-width: 480px;
            width: 100%;
            max-height: 85vh;
            overflow: auto;
            padding: 20px;
        }
        .modal h3 { font-size: 1.125rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        .modal .close {
            float: right;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px;
        }
        .bp-track { margin-top: 16px; }
        .bp-tier {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            background: var(--bg);
            margin-bottom: 8px;
            font-size: 0.75rem;
        }
        .bp-tier.claimed { opacity: 0.45; }
        .bp-tier.active { border: 1px solid var(--gold); }
        .bp-tier button {
            margin-left: auto;
            padding: 6px 10px;
            font-size: 0.6875rem;
        }
        .progress {
            height: 8px;
            background: var(--bg);
            border-radius: 6px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress > i {
            display: block;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #14b8a6);
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="layout" id="app"></div>
    <script type="module" src="./arcade-game.js"></script>
</body>
</html>
