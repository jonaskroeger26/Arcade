<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
    <meta name="theme-color" content="#09090b">
    <title>Arcade Empire</title>
    <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
    <script src="mwa-bundle.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --surface-hover: #27272a;
            --border: #27272a;
            --border-strong: #3f3f46;
            --accent: #0ea5e9;
            --accent-dim: rgba(14, 165, 233, 0.12);
            --violet: #8b5cf6;
            --violet-dim: rgba(139, 92, 246, 0.15);
            --success: #22c55e;
            --warning: #f59e0b;
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --danger: #ef4444;
            --floor: #27272a;
            --wall: #3f3f46;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: "DM Sans", system-ui, -apple-system, sans-serif;
            background: linear-gradient(165deg, #8eb4d4 0%, #b9d4ea 42%, #5a7a5a 42%, #3d5a3d 100%);
            color: var(--text);
            min-height: 100%;
            -webkit-font-smoothing: antialiased;
        }
        #app {
            max-width: 100%;
            width: 100%;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
            box-shadow: none;
        }
        .app-shell {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
        }
        /* —— Game Dev Tycoon–style studio shell —— */
        .gdt-shell {
            background: linear-gradient(180deg, #c5ddf0 0%, #dce8f2 100%);
            color: #1e293b;
        }
        .gdt-shell .tab-context,
        .gdt-shell .footer-note,
        .gdt-shell section h2 {
            color: rgba(30,41,59,0.75);
        }
        .gdt-shell .toolbar-label {
            color: rgba(30,41,59,0.65);
        }
        .gdt-top-hud {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            padding: 10px 8px 8px;
            padding-top: calc(10px + env(safe-area-inset-top, 0px));
            flex-shrink: 0;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255,255,255,0.5);
            background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.08) 100%);
        }
        .gdt-hud-left,
        .gdt-hud-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .gdt-hud-center {
            flex: 1 1 200px;
            min-width: 0;
            display: flex;
            justify-content: center;
            order: -1;
            width: 100%;
        }
        @media (min-width: 420px) {
            .gdt-hud-center {
                order: 0;
                width: auto;
            }
            .gdt-top-hud {
                flex-wrap: nowrap;
            }
        }
        .gdt-icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid rgba(30,41,59,0.15);
            background: rgba(255,255,255,0.65);
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            color: #334155;
        }
        .gdt-icon-btn:active { transform: scale(0.96); }
        .gdt-bubble {
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 44px;
            padding: 4px 8px 4px 6px;
            border-radius: 999px;
            font-size: 0.8125rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: #fff;
            text-shadow: 0 1px 1px rgba(0,0,0,0.2);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.35),
                0 2px 6px rgba(0,0,0,0.18);
        }
        .gdt-bubble-ico { font-size: 0.75rem; opacity: 0.95; }
        .gdt-bubble-orange { background: linear-gradient(165deg, #f59e0b 0%, #d97706 100%); }
        .gdt-bubble-yellow { background: linear-gradient(165deg, #fbbf24 0%, #ca8a04 100%); }
        .gdt-bubble-blue { background: linear-gradient(165deg, #38bdf8 0%, #0284c7 100%); }
        .gdt-bubble-teal { background: linear-gradient(165deg, #22d3ee 0%, #0891b2 100%); }
        .gdt-project-card {
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 8px 12px 10px;
            max-width: 280px;
            width: 100%;
            box-shadow: 0 4px 14px rgba(15,23,42,0.12);
        }
        .gdt-project-title {
            font-family: "Nunito", "DM Sans", sans-serif;
            font-weight: 800;
            font-size: 0.9375rem;
            color: #0f172a;
            letter-spacing: -0.02em;
        }
        .gdt-project-genre {
            font-size: 0.6875rem;
            color: #64748b;
            margin-top: 2px;
        }
        .gdt-progress-block { margin-top: 8px; }
        .gdt-progress-label {
            font-size: 0.5625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #64748b;
            margin-bottom: 4px;
        }
        .gdt-progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
        }
        .gdt-progress-bar > i {
            display: block;
            height: 100%;
            background: linear-gradient(90deg, #38bdf8 0%, #2563eb 100%);
            border-radius: 8px;
            transition: width 0.25s ease;
        }
        .gdt-hype-pill {
            margin-top: 6px;
            font-size: 0.6875rem;
            font-weight: 700;
            color: #475569;
        }
        .gdt-hype-pill strong { color: #0ea5e9; }
        .gdt-hud-stack {
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-size: 0.6875rem;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.25;
            font-variant-numeric: tabular-nums;
        }
        .gdt-hud-line { display: flex; align-items: center; gap: 4px; }
        .gdt-hud-ico { font-size: 0.75rem; opacity: 0.85; }
        .gdt-money { color: #16a34a; font-size: 0.75rem; }
        .gdt-source-pill {
            align-self: center;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #64748b;
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(30,41,59,0.12);
            text-decoration: none;
        }
        .gdt-source-pill:hover { color: #0f172a; background: #fff; }
        .gdt-main {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .gdt-main-world {
            overflow: hidden;
        }
        .game-landscape-shell {
            width: 100%;
            max-width: 100%;
        }
        .game-viewport {
            flex: 1;
            min-height: 0;
            width: 100%;
            min-height: min(56vh, 420px);
            min-height: min(56dvh, 420px);
        }
        @media (orientation: landscape) {
            .game-viewport {
                min-height: 0;
            }
        }
        .game-hud-landscape .gdt-hud-center {
            order: 0;
            width: auto;
        }
        .game-hud-landscape {
            flex-wrap: nowrap;
        }
        .game-fab-row {
            position: absolute;
            bottom: calc(100px + env(safe-area-inset-bottom, 0px));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px;
            z-index: 5;
            pointer-events: auto;
            max-width: calc(100% - 24px);
        }
        .game-fab-btn {
            padding: 9px 14px;
            border-radius: 999px;
            border: 1px solid rgba(30,41,59,0.18);
            background: rgba(255,255,255,0.94);
            font-weight: 700;
            font-size: 0.78rem;
            color: #1e293b;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(15,23,42,0.1);
        }
        .game-fab-btn:active {
            transform: scale(0.98);
        }
        .game-fab-btn--claw {
            border-color: rgba(236,72,153,0.35);
            background: linear-gradient(165deg, rgba(255,255,255,0.98) 0%, rgba(253,242,248,0.95) 100%);
        }
        .game-welcome-float {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 6;
            margin: 0 auto;
            max-width: 560px;
            pointer-events: auto;
        }
        .placement-bar--float {
            position: absolute;
            bottom: calc(158px + env(safe-area-inset-bottom, 0px));
            left: 10px;
            right: 10px;
            z-index: 5;
            margin: 0;
        }
        .game-control-hint {
            position: absolute;
            bottom: calc(52px + env(safe-area-inset-bottom, 0px));
            left: 10px;
            right: 10px;
            text-align: center;
            font-size: 0.65rem;
            color: rgba(30,41,59,0.55);
            z-index: 2;
            pointer-events: none;
            text-shadow: 0 1px 0 rgba(255,255,255,0.75);
        }
        @media (min-width: 720px) {
            .game-fab-row {
                bottom: calc(24px + env(safe-area-inset-bottom, 0px));
            }
            .placement-bar--float {
                bottom: calc(88px + env(safe-area-inset-bottom, 0px));
            }
            .game-control-hint {
                bottom: calc(72px + env(safe-area-inset-bottom, 0px));
            }
        }
        .world-3d-host,
        .world-3d-host-placeholder {
            position: absolute;
            inset: 0;
            z-index: 0;
        }
        .world-three-canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            touch-action: none;
        }
        .world-ui-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            pointer-events: none;
        }
        .world-ui-layer .gdt-room-scroll {
            pointer-events: auto;
            max-height: 58vh;
            flex: 0 1 auto;
            border-radius: 14px 14px 0 0;
            box-shadow: 0 -6px 28px rgba(15,23,42,0.14);
        }
        .world-ui-layer--world .gdt-room-scroll {
            max-height: 46vh;
        }
        .placement-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            background: rgba(14,165,233,0.12);
            border: 1px solid rgba(14,165,233,0.35);
        }
        .placement-bar-txt {
            flex: 1;
            min-width: 140px;
            font-size: 0.8125rem;
            color: #1e293b;
        }
        .tab-context kbd {
            font-family: ui-monospace, monospace;
            font-size: 0.6875rem;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(30,41,59,0.2);
            background: rgba(255,255,255,0.8);
        }
        .gdt-main-world .gdt-info-fab {
            z-index: 4;
        }
        .world-gl-loading {
            position: absolute;
            inset: 0;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(183,212,232,0.92) 0%, rgba(90,130,90,0.35) 100%);
            transition: opacity 0.45s ease, visibility 0.45s ease;
        }
        .world-gl-loading--hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .world-gl-loading-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 20px 28px;
            border-radius: 14px;
            background: rgba(255,255,255,0.82);
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 12px 40px rgba(15,23,42,0.15);
            font-size: 0.875rem;
            font-weight: 600;
            color: #334155;
        }
        .world-gl-spinner {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid rgba(14,165,233,0.25);
            border-top-color: #0ea5e9;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .game-welcome-banner {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 14px;
            margin-bottom: 14px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(14,165,233,0.12) 0%, rgba(139,92,246,0.1) 100%);
            border: 1px solid rgba(14,165,233,0.28);
        }
        .game-welcome-banner p {
            flex: 1;
            min-width: 0;
            font-size: 0.8125rem;
            line-height: 1.4;
            color: #1e293b;
            margin: 0;
        }
        .btn-dismiss-hint {
            flex-shrink: 0;
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            background: #0ea5e9;
            color: #fff;
        }
        .btn-dismiss-hint:hover { filter: brightness(1.05); }
        .gdt-mute-btn { font-size: 0.95rem !important; }
        .world-touch-controls {
            position: absolute;
            left: 12px;
            bottom: calc(12px + env(safe-area-inset-bottom, 0px));
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            pointer-events: auto;
        }
        .world-touch-controls--hidden {
            opacity: 0;
            pointer-events: none;
        }
        .touch-hint {
            font-size: 0.5625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: rgba(30,41,59,0.55);
        }
        .touch-joystick {
            position: relative;
            width: 112px;
            height: 112px;
        }
        .touch-joystick-base {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.5) 0%, rgba(148,163,184,0.35) 100%);
            border: 2px solid rgba(30,41,59,0.15);
            box-shadow: inset 0 2px 8px rgba(255,255,255,0.4), 0 4px 16px rgba(15,23,42,0.12);
        }
        .touch-joystick-stick {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 48px;
            height: 48px;
            margin: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle at 30% 25%, #fff 0%, #0ea5e9 45%, #0369a1 100%);
            box-shadow: 0 4px 12px rgba(14,165,233,0.45);
            pointer-events: none;
        }
        @media (min-width: 900px) {
            .world-touch-controls { opacity: 0.45; }
        }
        @media (prefers-reduced-motion: reduce) {
            .world-gl-spinner { animation: none; border-color: #0ea5e9; }
            .toast { animation: none; }
            .touch-joystick-stick { transition: none; }
        }
        .tab-btn:focus-visible,
        .gdt-icon-btn:focus-visible,
        button:focus-visible {
            outline: 2px solid #0ea5e9;
            outline-offset: 2px;
        }
        .gdt-room {
            flex: 1;
            min-height: 0;
            position: relative;
            display: flex;
            flex-direction: column;
            margin: 0 8px;
            border-radius: 12px 12px 0 0;
            overflow: hidden;
            box-shadow: 0 -2px 20px rgba(15,23,42,0.08);
        }
        .gdt-room-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .gdt-room-svg {
            width: 100%;
            height: 100%;
            min-height: 120px;
            object-fit: cover;
            display: block;
            opacity: 0.95;
        }
        .gdt-room-scroll {
            position: relative;
            z-index: 1;
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 14px 14px calc(52px + env(safe-area-inset-bottom, 0px));
            background: linear-gradient(180deg, rgba(255,255,255,0.42) 0%, rgba(248,250,252,0.92) 28%, rgba(248,250,252,0.97) 100%);
        }
        .gdt-info-fab {
            position: absolute;
            bottom: 14px;
            left: 10px;
            z-index: 2;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.9);
            background: linear-gradient(165deg, #a855f7 0%, #7c3aed 100%);
            color: #fff;
            font-size: 1rem;
            font-weight: 800;
            font-style: italic;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(124,58,237,0.45);
        }
        .gdt-info-fab:active { transform: scale(0.95); }
        .gdt-token-strip {
            margin-bottom: 14px;
        }
        .gdt-token-stat {
            background: rgba(255,255,255,0.75);
            border-color: rgba(148,163,184,0.45);
        }
        .gdt-tab-bar {
            background: linear-gradient(180deg, #e8f0f8 0%, #d4e4f2 100%) !important;
            border-top-color: rgba(148,163,184,0.45) !important;
        }
        .gdt-tab-bar .tab-btn {
            color: #475569;
        }
        .gdt-tab-bar .tab-btn.active {
            color: #0284c7;
            background: rgba(14,165,233,0.18);
        }
        .main-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 16px 12px;
            -webkit-overflow-scrolling: touch;
        }
        .live-strip {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 14px;
        }
        .live-strip-inner {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            font-variant-numeric: tabular-nums;
        }
        @media (max-width: 360px) {
            .live-strip-inner {
                grid-template-columns: repeat(2, 1fr);
                row-gap: 8px;
            }
        }
        .live-strip .cell label {
            display: block;
            font-size: 0.5625rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }
        .live-strip .cell strong {
            font-size: 0.8125rem;
            font-weight: 700;
        }
        .live-strip .cell.tickets strong { color: #fbbf24; }
        .live-strip .cell.hype strong { color: #2dd4bf; }
        .tab-context {
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.45;
            margin: 0 0 12px;
        }
        .tab-panel {
            display: none;
            animation: tabFade 0.2s ease;
        }
        .tab-panel.active {
            display: block;
        }
        @keyframes tabFade {
            from { opacity: 0.85; }
            to { opacity: 1; }
        }
        .tab-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .tab-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            min-height: 48px;
            padding: 8px 6px;
            border-radius: 10px;
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .tab-btn:active { transform: scale(0.97); }
        .tab-btn .tab-ico {
            font-size: 1.125rem;
            line-height: 1;
            opacity: 0.9;
        }
        .tab-btn.active {
            color: var(--accent);
            background: var(--accent-dim);
        }
        .top {
            margin-bottom: 20px;
        }
        .top-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }
        .top h1 {
            font-weight: 700;
            font-size: 1.375rem;
            letter-spacing: -0.03em;
            line-height: 1.2;
        }
        .top .subtitle {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 4px;
            max-width: 260px;
            line-height: 1.4;
        }
        .top a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8125rem;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }
        .top a:hover { background: var(--surface-hover); color: var(--text); }
        .hud {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
        }
        .stat .lbl {
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .stat .val {
            font-size: 1.25rem;
            font-weight: 700;
            margin-top: 6px;
